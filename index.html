  <script>
    window.addEventListener('DOMContentLoaded', function () {
      const{useState:useState,useEffect:useEffect}=React,lessons=[{id:0,title:"Welcome In",accent:"In",dur:"7 min",emoji:"🤗",hasVideo:!0,overview:{desc:"The purpose of this mini course is to help you make the most of this space from Day 1. I know how overwhelming it can be to join a new community and be so excited to dive in but overwhelmed at all the possibilities, so I wanted to make it as simple for you to get started crushing it in your spiritual business as possible.",hero:"When the teacher is ready, the student appears. When the student is ready, the teacher appears.",showMissionCard:!0,showAboutAmanda:!0,showOldBargain:!0,showValuesTriad:!0,showCategoryMap:!0,showFireStreak:!0},concepts:[{type:"pullquote",text:"Doing the right thing at the wrong time is still the wrong thing. We're not here to hit $10k months once. We're here to build something you can actually hold."},{type:"accordion",headline:"This is a Role Model space",icon:"💜",body:"I'm here on this journey along with you, sharing what's working for me as I build. Every woman in here brings her own wealth of perspective and life experience, so this isn't just my space, it's ours. I created the community I wished existed when I was getting started. You coming in here is already part of what makes it work."},{type:"accordion",headline:"Soft life, savage execution",icon:"🌿",body:"Sustainable visibility and aligned strategy. Not hustle culture in a spiritual costume. We build in public, because our job is literally just to make ourselves discoverable. Hiding in a cave building in secret for years is not the move. The more people who know who you are, what you do, and how you help them, the more successful you're going to be."},{type:"accordion",headline:"Attraction over persuasion",icon:"✨",body:"This is anti-bro-marketing. No fake scarcity. No hype. No convincing. Pull marketing, not push marketing. The more you show up in alignment with who you are, speaking your truth, the more the right people get magnetized to you. You don't have to chase. You have to be findable."},{type:"pullquote",text:"We all have a magnetic monopole in our center that's constantly attracting the right people, places, and opportunities to us. The seed you plant today is not a fig tree tomorrow."}],actions:["Download the Skool app on your phone (iOS or Android) so you get notified about Revenue Lab calls, comments, and community drops the second they happen. Single highest-leverage thing you can do in your first 5 minutes.","Take a tour of the top nav: Community (feed), Classroom (your courses), Calendar (live calls), Members, Leaderboards.","Start building your 🔥 streak today. Comment on 2-3 posts from other members right now to begin earning your fire emoji."],promptIntro:"Copy this intro template and paste it into your first post in The Collective 💜. Fill in the arrows with your actual answers — that's it.",promptBadge:"Copy-paste into Skool →",prompt:"Drop a quick post in the community (or the comments below)\nKeep it simple:\n→ Your name & where you're from\n→ What you do or what you're building (share your Skool if you have one)\n→ Your first question or feedback\n→ Your Human Design type (if you know it)\n\nBonus points if you drop a photo of your workspace 🖥️"},{id:1,title:"The 4-Minute Soul Diagnostic",accent:"Soul Diagnostic",dur:"4 min",emoji:"🔮",overview:{desc:"The reason most women don't get where they want to go isn't a lack of ideas. It's too many ideas and not enough follow-through on the right one. This quiz exists so you don't come into this space empty and leave empty. Four minutes. Five questions. One clear path. Based on where you actually are right now, not where you wish you were.",hero:"If you don't know why you do the things you do, you'll come into this space empty and leave empty. The quiz is how we make sure that doesn't happen.",showPathConvergence:!0,showPrimarySupporting:!0},concepts:[{type:"pullquote",text:"Answer from where you are, not where you wish you were. The accuracy of your result depends entirely on your honesty."},{type:"accordion",headline:"Why this quiz comes first",icon:"🎯",body:"Everything else in this community (classrooms, tools, calls, challenges) is more powerful when you know where to start. The quiz removes the overwhelm of 'where do I even begin' and replaces it with a clear primary path plus a supporting resource. One clear direction beats seventeen open tabs every single time. This is the Simplicity value in action."},{type:"accordion",headline:"Your archetype, decoded",icon:"🌟",body:"The quiz gives you two things: a PRIMARY PATH (the ONE thing to focus on first, usually a challenge, course, or system inside the community) and a SUPPORTING RESOURCE (a complementary tool or course that reinforces the primary path). That's it. Two things. Not seventeen."},{type:"callout",style:"white",headline:"Most paths live in Standard",body:"A few resources live in Premium alongside the weekly live coaching calls with me. If your quiz routes you toward one of those, that's the signal Premium might be your next right move."},{type:"accordion",headline:"Trust your gut over the quiz",icon:"🌙",body:"If you take the quiz and your gut disagrees with the result, trust your gut. Use the quiz as a second opinion. You know yourself better than any algorithm does. Your authority in Human Design is your inner GPS. Use it."}],actions:["Take the Choose Your Execution Path quiz (linked in the classroom alongside this lesson).","Screenshot or write down your primary path and supporting resource.","Post your result in Eyes On This 👁️ with one sentence about what it confirmed or surprised you. Bonus: attach the screenshot so other women can see your archetype and cheer you on."]},{id:2,title:"Your Execution Path, Decoded",accent:"Decoded",dur:"8 min",emoji:"🌀",overview:{desc:"Your quiz pointed you somewhere. Now let's walk through the fork in the road so the choice makes sense. One core question decides everything: what do you actually want to sell? This lesson explains when to pick each path so you stop second-guessing your result.",hero:"Awareness is the beginning of devotion. Name the shiny objects in advance and they lose their pull in the moment.",showInfiniteVsFinite:!0},concepts:[{type:"path-picker"},{type:"accordion",headline:"Infinite game vs finite game",icon:"♾️",body:"Your offer determines the entry point that fits. RECURRING MEMBERSHIP = infinite game. Your members are playing an ongoing game with you, so your entry point should also be an infinite system (like the Visibility by Design Challenge, which is the work you already need to be doing to grow your business). HIGH TICKET = finite game. Clear start, clear end, one specific result. The 5 Day Client Challenge is built this way on purpose: 5 days, 30 minutes a day, one hands-on transformation, which naturally reveals the next layer your high-ticket offer solves."},{type:"pullquote",text:"Match your entry point to the game you're inviting people into."},{type:"accordion",headline:"Commit to ONE, finish it",icon:"🎯",body:"Pick the path that aligns with this quarter's #1 goal. Go to that classroom. Watch the full video before touching any other resource. Stacking all three paths at once is how women end up executing none of them. Your path can and will evolve, it's a beautiful part of being an entrepreneur. But you can only execute one at a time cleanly. This is the Momentum value in action."},{type:"callout",style:"gradient",headline:"Your path can evolve",body:"Pick the one that matches this quarter's #1 goal, not your five-year vision. You'll grow. The path will shift. That's the point."}],actions:["Commit to ONE path for this week. Write it down somewhere visible (phone lock screen, desktop sticky, post-it).","Go to that classroom inside Spiritual Business Skool and watch the first video fully before opening any other resource.","Block two 90-minute execution sessions in your calendar this week for actual creation, not consumption.","Run the Shiny Object Awareness Prompt (below) and share your mantra in the community so we can hold each other accountable."],prompt:"I've just committed to one execution path for the next week:\n\nMy committed path: [VISIBILITY BY DESIGN / 5-DAY CLIENT CHALLENGE / SKOOL SETUP]\nMy #1 goal this quarter: [YOUR GOAL]\nMy Human Design type: [TYPE / AUTHORITY]\n\nBased on this, help me become aware of the shiny object distractions most likely to pull me off course this week. Name the top 3 specific temptations (new courses, new offers, new niches, new platforms, comparison spirals) I'm likely to encounter. Then give me a short, grounded, kind mantra I can say to myself to stay focused when one of them shows up. Not militant, not hustle-culture, just a loving reminder of the path I chose and why."},{id:3,title:"Open the Treasure Chest",accent:"Treasure Chest",dur:"7 min",emoji:"🎁",overview:{desc:"Even if your primary path is NOT the Treasure Chest, you still need to know it exists, because these tools are how you'll execute everything else faster. 35+ done-for-you artifacts (and growing all the time) you can use as freebies, lead magnets, mini offers, or client tools. Plus the A to Z Tool & Resource Library for plug-and-play templates that work immediately.",hero:"You're looking at an artifact right now.",showSameToolTwoPositions:!0,showTreasureGrid:!0},concepts:[{type:"accordion",headline:"What's an artifact?",icon:"🪞",body:"An artifact is an interactive, browser-based tool that feels premium and completable. This mini course you're working through right now? That's an artifact. Way more engaging than a static PDF. Way more memorable than a Google Doc. It's why people actually finish them."},{type:"pullquote",text:"If your content is for everyone, it is for no one. Each artifact is a spear. The membership is the room it lives in."},{type:"accordion",headline:"Why specificity wins",icon:"🎯",body:"A community on its own is a vague offer. Memberships and recurring subscriptions are inherently unattractive. People don't want more subscriptions. What makes them work is the specific tools, results, and experiences inside them. Promote ONE artifact that solves ONE clear problem for ONE specific person. That's the offer that pierces through the algorithm."},{type:"accordion",headline:"The one-artifact rule",icon:"✨",body:"One artifact solves one clear problem for one specific person. Specificity is what makes it feel valuable. The beautiful part of the Treasure Chest: each artifact is already specific. You're not building from scratch, you're customizing. Don't download all 35+ at once. Install one. Promote it. Master it. Then add the next."},{type:"accordion",headline:"Brand it in under 10 minutes",icon:"🎨",body:"You can rebrand any artifact to your business in plain English inside Claude. No code. No designer. No tech overwhelm. The full walkthrough on how to customize, share, and even build your own lives inside the AI Marketing Treasure Chest classroom."}],actions:["Open the AI Marketing Treasure Chest classroom and skim what's available. Each artifact has its own module with a tutorial video. Don't download them all yet.","Pick ONE artifact that matches a problem your audience actually asks you about.","Decide: free lead magnet or paid mini offer?","Spend 30 focused minutes branding it and getting it live (walkthrough is inside the 10x Your Skool classroom).","Share it in Wins & Synchronicities 🎉 with the link and ask for feedback. The community LOVES to celebrate this."],prompt:"Help me pick my first artifact from the AI Marketing Treasure Chest. My niche is [YOUR NICHE], my audience is [WHO THEY ARE], and the #1 question they ask me is [THAT QUESTION]. Recommend which type of artifact would solve that problem fastest, suggest whether to use it as a free lead magnet or a paid mini offer, and give me the exact headline, one-sentence pitch, and short delivery message I'd use when someone opts in or buys."},{id:4,title:"Soul-Aligned Strategy",accent:"Strategy",dur:"8 min",emoji:"🔮",hasVideo:!0,overview:{desc:"Strategy without alignment is just high-performing hustle bro-marketing. And we don't do that. This lesson is what makes everything else sustainable. You'll meet the core concepts behind Human Design and Kabbalistic Astrology, and the resources in this community that let you personalize every business decision to your actual wiring.",hero:"You were not a mistake of timing. You were perfectly scheduled.",showChartFocus:!0,showNodeArrow:!0},concepts:[{type:"callout",style:"white",headline:"You are a once-in-a-billion-trillion-years cosmic event",body:"Your soul chose the exact moment in time to be born that gave you the greatest opportunity of exercising your free will to become more like the light of the Creator. The gifts, insights, experiences, and even the baggage you carry are yours alone. They serve the collective in a way no one else can replicate."},{type:"pullquote",text:"Strategy without alignment is just hustle bro-marketing in a prettier outfit. We don't do that. Ew. Who even is that?"},{type:"accordion",headline:"Human Design is the part, Astrology is the movie",icon:"🎭",body:"HUMAN DESIGN is how your energy actually works. Your internal energetics. Not a personality test. This is the part you play. ASTROLOGY is the bigger arc, themes, timing, and lessons of this lifetime. This is the movie you're in. Both together = your soul-aligned operating system."},{type:"accordion",headline:"Focus on these three. Ignore the rest.",icon:"🎯",body:"Your chart looks overwhelming on purpose. Don't try to learn all of it. Start here, in this order. 1) TYPE: how your energy moves through the world. 2) PROFILE: the characteristics that, when embodied, create more freedom, flow, and abundance. 3) AUTHORITY: your inner GPS for decision-making. In HD, your mind is never the authority. You have your own internal decision-making mechanism. SKIP FOR NOW: Split Definition, Gates, Channels, Incarnation Cross. Layer in slowly."},{type:"pullquote",text:"Too much imaginary knowledge you don't know what to do with makes you a crazy person. We don't want that."},{type:"accordion",headline:"Your North Node is the growth edge",icon:"🌟",body:"In Kabbalistic Astrology, your North Node is the most important point on your chart. It represents who you're here to become, grow into, and transform into this lifetime. Every time I've launched something aligned with my North Node (Aquarius: innovation, tech, collective), my business has taken off. That's not coincidence. That's alignment."},{type:"accordion",headline:"Alignment is why something isn't working",icon:"⚡",body:"Ignoring your design is the #1 cause of doing all the things and having nothing feel aligned. The answer is almost never more effort. If you keep efforting the same things, you keep getting the same results. You don't need to become a Human Design or astrology expert. You just need to know enough to stop copy-pasting someone else's strategy and wondering why it's not working for you."}],actions:["Pull your Human Design chart free at ihdschool.com/get-your-chart.","Pull your astrology chart (to find your Sun, Moon, Rising, and North Node) at horoscopes.astro-seek.com.","Save these 4 things somewhere you'll actually reference: Type, Authority, Profile, North Node.","Open Find Your Online Persona with Human Design (Standard) and watch the first lesson to see how your design shapes the way you're meant to show up online.","If you're in Premium, open the CEO Oracle GPT and run your first aligned strategy session. Click the Calendar tab and add the weekly Revenue Lab calls to your personal calendar. Set it to repeat weekly!","Name one strategy you've been forcing that your design is asking you to stop. Actually stop it.","(Optional but recommended) Follow me where I share behind-the-scenes builds and real-time strategy: Instagram @amanda.fieldingsmith · TikTok @amandafieldingsmith · YouTube @AmandaFieldingSmith."],prompt:"I'm a [HUMAN DESIGN TYPE] with [AUTHORITY] authority, my profile is [PROFILE], and my North Node in Kabbalistic Astrology is in [SIGN/HOUSE if known].\n\nBased on this, help me write a short community post for my Spiritual Business Skool feed (category: Eyes On This 👁️). The headline of the post should be: My Soul Aligned Strategy ✨\n\nThe post should share:\n1. One strategy I've been forcing that my design is actually telling me to stop 🛑\n2. What I'm going to do instead this month 🌿\n3. A question at the end that invites other women to share what THEIR design is asking them to release 💬\n\nUse emojis naturally where they add warmth or rhythm, not stacked or decorative. Voice: grounded, real, slightly vulnerable, not preachy or guru-ish. No hashtags. Under 150 words. Make it feel like me thinking out loud with the community, not a polished lesson."},{id:5,title:"Your First Win",accent:"First Win",dur:"6 min",emoji:"🏆",overview:{desc:"Everything in Days 1 through 5 was orientation, theory, and behind-the-scenes context. Today is execution. You don't need 10 half-started things. You need ONE shipped thing that builds real momentum. Fill out your First Win Commitment Card, execute it this week, share it with the community.",hero:"It doesn't matter how much tweaking or building you do if nobody knows about it. Shipping is part of the strategy, not the reward for finishing it.",showHalfStartedVsShipped:!0,showTierComparison:!0,showVipReadiness:!0},concepts:[{type:"pullquote",text:"It doesn't count unless it ships. Momentum over perfection."},{type:"accordion",headline:"Your first week ships ONE thing",icon:"🚀",body:"Pick one win. Commit to a ship date. Actually hit publish. Not: keep tweaking, keep building, keep 'almost ready' for weeks while nobody knows you exist. Shipping is how momentum starts. Everything else is procrastination in a trenchcoat. I had to relearn this myself. It's really easy to build and tweak behind the scenes without sharing. Don't do that."},{type:"callout",style:"white",headline:"Doing the right thing at the wrong time is still the wrong thing",body:"We're not shipping for the sake of shipping. We're shipping so that the thing actually builds on itself. A $10k month you can't hold isn't a win. A launch that burns you out for three months isn't a win. A first win that you can keep compounding from? That's the goal. That's what sustainable, soul-aligned business actually looks like."},{type:"accordion",headline:"Posting your commitment IS the execution",icon:"💫",body:"Posting publicly in the community isn't optional social stuff. It's the accountability layer. Public commitment equals faster shipping equals momentum from day one. You can also use your commitment post to request what you want built next inside the community. An artifact, a training, a topic. I read every single one, and your requests shape what comes next. Tag @Amanda Smith if you want to guarantee I see it."},{type:"callout",style:"gradient",headline:"Encouragement is the currency",body:"The fastest way to get the most out of this space: show up for other members first. Leave real comments on at least 3 other posts today. The Role Model framework only works if we cheer each other on out loud. This community isn't a static library of my stuff. We're building it together."},{type:"accordion",headline:"Loom is your unstuck button",icon:"🎥",body:"If you ever hit a wall anywhere inside this community (an artifact, a tech thing, a customization question), record a quick Loom (loom.com, free up to 5 min). Go to Loom, click New Video, then Record Video, and select FULL SCREEN (not camera only, so I can actually see what you're looking at). Walk through what you're stuck on. Post it in Eyes On This 👁️. Real feedback within hours instead of days. This is literally how I record these lessons."},{type:"accordion",headline:"When you're ready for more support",icon:"🚪",body:"When you want live coaching, personalized feedback from me, or 1:1 attention, visit skool.com/amanda/plans for the current format on Premium and VIP. No pressure. The door is open whenever you're ready."}],actions:["Open your First Win Commitment Card: https://claude.ai/public/artifacts/f5215a22-5042-4a9a-b8a6-8c407c0665ff. Fill it out with your archetype, biggest aha, first win, and ship date.","Screenshot the result (or copy the text, both work).","Post it in Wins & Synchronicities 🎉. Tag @Amanda Smith if you want to make sure I catch it.","Comment on at least 3 other members' posts today. Real comments, not just 'love this!'. Encouragement compounds.","Ship your first win by the date you committed to.","Share the result in Wins & Synchronicities 🎉 when it's live. That's how you become someone the community recognizes."]},{id:6,title:"Make It Free For Life",accent:"Free For Life",dur:"3 min",emoji:"💚",overview:{desc:"Okay, fun one. You can literally make Spiritual Business Skool free for life (and actually make money on top of it) just by sharing the link to a community you're already in. Every member here earns 40% commission on every person they invite, for life, at whatever tier that person joins. Skool handles the whole thing. You don't have to build funnels, create tracking links, or do any of that. Just copy, paste, share. 💸",hero:"Invite 3 friends to Standard and you've just made Spiritual Business Skool free for life. Invite 3 to Premium and you're profiting from a membership you were already paying for.",showReferralMath:!0},concepts:[{type:"invite-walkthrough"},{type:"accordion",headline:"How the 40% actually works 💰",icon:"💰",body:"You get 40% of whatever tier someone joins at. Standard, Premium, VIP, doesn't matter, you get 40% of it. For the lifetime of their membership. Paid automatically through Skool within 14 days of their payment. There's nothing for you to track, no affiliate dashboard to check, no links to generate. Skool handles all of it on their end. You literally just share your link and vibe. ✨"},{type:"pullquote",text:"This isn't a side hustle. This is you getting paid for something you were already going to do: tell your friends about the community you love."},{type:"accordion",headline:"Who to share it with 💜",icon:"💜",body:"Think about the women in your DMs who keep asking how you're doing the things you're doing. Your friends who are building their own Skools. Coaches, service providers, spiritual entrepreneurs, content creators, healers, women who are tired of being in communities that are ghost towns. Anyone who'd genuinely benefit from 35+ done-for-you AI artifacts, a visibility challenge designed around their Human Design, and a community that's actually active. You don't need to sell anything. You just need to be honest about what's working for you. That's it."},{type:"accordion",headline:"Don't overthink it, just use the templates 📝",icon:"📝",body:"Two copy-paste templates are in the Prompt tab. One for social media (IG, threads, LinkedIn, FB, wherever you post). One for sharing inside your own Skool community if you have one. Both are written in a real voice, not bro-marketing. You just personalize the bracketed parts with YOUR specific win from being in here and ship it. Seriously, that's the whole move."}],actions:["Go grab your affiliate link from the community page (walkthrough above in Key Concepts).","Save it somewhere you'll actually find it again. Phone notes, a pinned message to yourself, Notion, whatever works for you.","Pick ONE platform where your people already hang out.","Open the Prompt tab, pick the template that fits (social or Skool post), and fill in the 2 brackets. That's all you have to customize.","Ship it. Even if your audience is 12 people, ship it. Every single person who's made money from this started with one post. 🚀","Come post in Wins & Synchronicities 🎉 when someone joins through your link so we can celebrate you."],prompt:"Two copy-paste templates below. Pick one, fill in the 2 bracketed spots with YOUR real experience, and 2.2vw,24px);line-height:1.45;\n  color:#332756;\n}\n\n/* ======== Tier Comparison ======== */\n.tier-wrap{margin-top:28px}\n.tier-intro{text-align:center;margin-bottom:20px}\n.tier-intro-badge{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;\n  color:var(--cyan);text-transform:uppercase;font-weight:500;margin-bottom:8px;\n}\n.tier-intro-title{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;color:var(--ink);margin-bottom:6px;\n}\n.tier-intro-sub{font-size:13px;color:var(--ink-faint)}\n.tier-link{color:var(--cyan);font-weight:600}\n\n.tier-cards{\n  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\n  margin-top:8px;\n}\n.tier-card{\n  border-radius:18px;padding:22px 20px;\n  position:relative;overflow:hidden;\n  transition:all .35s cubic-bezier(.34,1.56,.64,1);\n  display:flex;flex-direction:column;\n}\n.tier-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(178,107,255,0.3)}\n\n.tier-light{\n  background:var(--cream);\n  color:var(--ink-dark);\n  box-shadow:0 8px 32px rgba(178,107,255,0.15), 0 0 0 1px rgba(255,255,255,0.4) inset;\n}\n.tier-light .tier-name{color:var(--ink-dark)}\n.tier-light .tier-tagline{color:#6b5d8a}\n.tier-light .tier-desc{color:#4d4268}\n.tier-light .tier-item-text{color:#332756}\n.tier-light .tier-cta{color:var(--purple);border-top:1px dashed rgba(178,107,255,0.3)}\n.tier-light .tier-divider{background:rgba(178,107,255,0.2)}\n\n.tier-dark{\n  background:linear-gradient(145deg, #1c1340 0%, #13092a 100%);\n  border:1px solid var(--border-strong);\n  color:var(--ink);\n}\n.tier-dark .tier-cta{color:var(--purple-2);border-top:1px dashed rgba(178,107,255,0.3)}\n.tier-dark .tier-divider{background:rgba(178,107,255,0.25)}\n\n.tier-holo{\n  background:\n    linear-gradient(145deg, rgba(255,107,193,0.15), rgba(107,213,255,0.1)),\n    linear-gradient(145deg, #2a1a4d 0%, #1a0f36 100%);\n  border:1px solid rgba(255,138,209,0.4);\n  color:var(--ink);\n  box-shadow:0 0 40px rgba(255,138,20 1px);\n}\n\n/* ======== VIP Readiness (Day 6) ======== */\n.vip-ready-wrap{\n  margin-top:28px;padding:28px 26px;\n  border-radius:22px;\n  background:\n    linear-gradient(160deg, rgba(255,107,193,0.1), rgba(107,213,255,0.06)),\n    linear-gradient(145deg, #1c1340 0%, #13092a 100%);\n  border:1px solid rgba(255,138,209,0.35);\n  position:relative;overflow:hidden;\n}\n.vip-ready-wrap::before{\n  content:'';position:absolute;top:-80px;left:-40px;\n  width:220px;height:220px;\n  background:radial-gradient(circle,rgba(255,107,193,0.18),transparent 70%);\n  pointer-events:none;\n}\n.vip-ready-wrap::after{\n  content:'';position:absolute;bottom:-60px;right:-30px;\n  width:180px;height:180px;\n  background:radial-gradient(circle,rgba(142,255,213,0.12),transparent 70%);\n  pointer-events:none;\n}\n.vip-ready-intro{text-align:center;margin-bottom:22px;position:relative;z-index:1}\n.vip-ready-badge{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;\n  background:var(--holo);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;\n  text-transform:uppercase;font-weight:500;margin-bottom:8px;\n}\n.vip-ready-title{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;\n  color:var(--ink);letter-spacing:-0.3px;margin-bottom:8px;\n}\n.vip-ready-sub{\n  font-size:13.5px;line-height:1.65;color:var(--ink-soft);\n  max-width:520px;margin:0 auto;\n}\n.vip-ready-grid{\n  display:grid;grid-template-columns:repeat(2,1fr);gap:12px;\n  position:relative;z-index:1;\n}\n.vip-ready-card{\n  display:flex;gap:14px;align-items:flex-start;\n  padding:16px 18px;border-radius:14px;\n  background:rgba(255,255,255,0.04);\n  border:1px solid var(--border);\n  transition:all .25s;\n}\n.vip-ready-card:hover{\n  transform:translateY(-2px);\n  background:rgba(255,255,255,0.06);\n  border-color:var(--border-strong);\n  box-shadow:0 8px 24px rgba(178,107,255,0.18);\n}\n.vip-ready-icon{\n  font-size:22px;line-height:1;flex-shrink:0;margin-top:2px;\n  filter:drop-shadow(0 3px 10px rgba(255,107,193,0.3));\n}\n.vip-ready-text{\n  font-size:13.5px;line-height:1.55;color:var(--ink);\n  font-family:'Nunito',sans-serif;font-weight:500;\n}\n.vip-ready-footer{\n  margin-top:18px;padding:14px 18px;border-radius:12px;\n  background:rgba(255,255,255,0.035);\n  border:1px dashed rgba(255,138,209,0.3);\n  font-size:13px;line-height:1.65;color:var(--ink-soft);\n  position:relative;z-index:1;\n}\n.vip-ready-dot{color:var(--pink);margin-right:6px;font-weight:700}\na.vip-ready-link{\n  color:var(--mint);font-weight:700;text-decoration:none;\n  border-bottom:1px dashed rgba(142,255,213,0.4);\n  transition:all .2s;\n}\na.vip-ready-link:hover{color:var(--cyan);border-bottom-color:var(--cyan)}\n\n/* ======== Philosophy Triad (Day 1) ======== */\n.triad-wrap{margin-top:24px;position:relative}\n.triad-intro{text-align:center;margin-bottom:22px}\n.triad-badge{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;\n  color:var(--cyan);text-transform:uppercase;font-weight:500;\n}\n.triad-grid{\n  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\n  position:relative;z-index:1;\n}\n.triad-card{\n  position:relative;\n  padding:28px 20px 24px;border-radius:20px;\n  background:linear-gradient(160deg,var(--cream) 0%,var(--cream-2) 100%);\n  color:var(--ink-dark);text-align:center;\n  box-shadow:0 8px 28px rgba(178,107,255,0.18), 0 0 0 1px rgba(255,255,255,0.4) inset;\n  transition:all .35s cubic-bezier(.34,1.56,.64,1);\n  overflow:hidden;\n}\n.triad-card::before{\n  content:'';position:absolute;top:0;left:0;right:0;height:3px;\n  background:var(--holo);opacity:0.85;\n}\n.triad-card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 14px 38px rgba(178,107,255,0.28)}\n.triad-emoji{\n  font-size:36px;line-height:1;margin-bottom:10px;\n  filter:drop-shadow(0 4px 12px rgba(178,107,255,0.3));\n  animation:triad-float 4s ease-in-out infinite;\n}\n.triad-card:nth-child(2) .triad-emoji{animation-delay:.8s}\n. ize:11px;letter-spacing:1.5px;\n  color:var(--mint);text-transform:uppercase;font-weight:500;\n  padding-top:12px;border-top:1px dashed rgba(142,255,213,0.3);\n}\n\n/* ======== Philosophy Triad (Day 1) ======== */\n.triad-wrap{margin-top:22px}\n.triad-intro{text-align:center;margin-bottom:16px}\n.triad-badge{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;\n  color:var(--mint);text-transform:uppercase;font-weight:500;\n}\n.triad-grid{\n  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\n  position:relative;padding:8px 0;\n}\n.triad-ring{\n  position:absolute;inset:10% 12%;\n  border-radius:50%;\n  background:radial-gradient(ellipse, rgba(255,138,209,0.15), transparent 60%);\n  pointer-events:none;z-index:0;\n  animation:triad-pulse 4s ease-in-out infinite alternate;\n}\n@keyframes triad-pulse{\n  0%{opacity:0.4;transform:scale(0.95)}\n  100%{opacity:0.8;transform:scale(1.05)}\n}\n.triad-card{\n  position:relative;z-index:1;\n  background:var(--cream-2);color:var(--ink-dark);\n  border-radius:18px;padding:22px 18px;text-align:center;\n  box-shadow:0 8px 24px rgba(178,107,255,0.15), 0 0 0 1px rgba(255,255,255,0.5) inset;\n  transition:all .3s cubic-bezier(.34,1.56,.64,1);\n}\n.triad-card:hover{transform:translateY(-4px) rotate(-1deg);box-shadow:0 14px 32px rgba(178,107,255,0.25)}\n.triad-card:nth-child(2):hover{transform:translateY(-4px) rotate(0deg)}\n.triad-card:nth-child(3):hover{transform:translateY(-4px) rotate(1deg)}\n.triad-emoji{font-size:34px;line-height:1;margin-bottom:10px;filter:drop-shadow(0 2px 10px rgba(178,107,255,0.3))}\n.triad-label{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:16px;\n  color:var(--ink-dark);letter-spacing:-0.2px;margin-bottom:4px;\n}\n.triad-sub{\n  font-family:'Fraunces',serif;font-style:italic;font-weight:500;\n  font-size:12.5px;color:#6b5d8a;line-height:1.35;\n}\n\n/* ======== Chart Focus (Day 5) ======== */\n.cf-wrap{margin-top:22px;padding:26px;border-radius:22px;\n  backgroun 178,107,255,0.25);\n  position:relative;z-index:1;\n}\n.cf-skip-label{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;\n  color:var(--ink-faint);text-transform:uppercase;font-weight:500;margin-right:4px;\n}\n.cf-skip-chip{\n  font-size:11.5px;color:var(--ink-faint);\n  padding:4px 10px;border-radius:50px;\n  background:rgba(255,255,255,0.04);\n  text-decoration:line-through;text-decoration-color:rgba(255,107,193,0.5);\n  text-decoration-thickness:1.5px;\n}\n\n/* ======== Actions pane ======== */\n.actions-pane{gap:12px}\n.actions-lead{\n  padding:18px 20px;border-radius:14px;\n  background:linear-gradient(135deg, rgba(255,138,209,0.1), rgba(178,107,255,0.1));\n  border:1px solid var(--border);\n  margin-bottom:8px;\n}\n.actions-lead-badge{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;\n  color:var(--pink-2);text-transform:uppercase;font-weight:500;margin-bottom:4px;\n}\n.actions-lead-text{font-size:13.5px;line-height:1.6;color:var(--ink-soft)}\n\n.action-card{\n  display:flex;gap:16px;padding:18px 22px;\n  background:var(--cream-2);\n  border-radius:14px;\n  box-shadow:0 4px 18px rgba(178,107,255,0.1), 0 0 0 1px rgba(255,255,255,0.4) inset;\n  transition:all .25s;\n}\n.action-card:hover{transform:translateX(4px);box-shadow:0 6px 24px rgba(178,107,255,0.18)}\n.action-num{\n  font-family:'DM Mono',monospace;font-size:14px;font-weight:500;\n  color:var(--purple);\n  min-width:32px;padding-top:2px;\n  letter-spacing:1px;\n}\n.action-text{\n  font-size:14.5px;line-height:1.65;color:var(--ink-dark);\n  flex:1;font-family:'Nunito',sans-serif;font-weight:500;\n}\n\n/* ======== Prompt pane ======== */\n.prompt-intro{font-size:14px;line-height:1.65;color:var(--ink-soft);padding:0 4px}\n.prompt-box{\n  background:linear-gradient(135deg, #0d0922, #1c1340, #0d0922);\n  border-radius:18px;padding:26px;position:relative;\n  border:1px solid var(--border-strong);overflow:hidden;\n}\n.prompt-box::before{\n  content:'';position:absolute;top:-60px;right:-60px;\n  width:180px;height:180px;\n  background:radial-gradient(circle, rgba(255,107,193,0.18) 0%, transparent 70%);\n  pointer-events:none;\n}\n.prompt-box::after{\n  content:'';position:absolute;bottom:-40px;left:-40px;\n  width:140px;height:140px;\n  background:radial-gradient(circle, rgba(107,213,255,0.12) 0%, transparent 70%);\n  pointer-events:none;\n}\n.prompt-hdr{\n  display:flex;align-items:center;justify-content:space-between;\n  margin-bottom:18px;position:relative;z-index:1;\n}\n.prompt-badge{\n  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2.5px;\n  text-transform:uppercase;color:var(--cyan);font-weight:500;\n}\n.prompt-copy-btn{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.5px;\n  font-weight:600;color:#fff;background:var(--holo);\n  padding:8px 16px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;\n  box-shadow:0 2px 12px rgba(178,107,255,0.4);\n}\n.prompt-copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(178,107,255,0.55)}\n.prompt-text{\n  font-family:'DM Mono',monospace;font-size:12px;line-height:1.9;\n  color:rgba(245,240,255,0.78);white-space:pre-wrap;\n  position:relative;z-index:1;\n}\n\n/* ======== Bottom + footer ======== */\n.lesson-bottom{\n  margin-top:40px;padding-top:28px;\n  border-top:1px solid var(--border);\n  display:flex;align-items:center;justify-content:space-between;gap:16px;\n}\n.bottom-done-btn{\n  display:inline-flex;align-items:center;gap:8px;\n  font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;\n  padding:14px 30px;border-radius:50px;border:none;cursor:pointer;transition:all .2s;\n  letter-spacing:0.3px;\n}\n.bottom-done-btn.pending{\n  background:var(--holo);color:#fff;\n  box-shadow:0 6px 24px rgba(178,107,255,0.4),inset 0 1px 0 rgba(255,255,255,0.25);\n}\n.bottom-done-btn.pending:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(178,107,255,0.55)}\n.bottom-done-btn.complete{background:rgba(255,107,193,0.15);color:var(--pink);border:1px solid var(--border-strong)}\n.bottom-next{\n  display:inline-flex;align-items:center;gap:6px;\n  font-size:13px;color:var(--ink-soft);cursor:pointer;transition:color .15s;\n  background:none;border:none;font-family:'Nunito',sans-serif;font-weight:600;\n}\n.bottom-next:hover{color:var(--cyan)}\n\n.lesson-footer{margin-top:52px;padding-top:28px;border-top:1px solid var(--border);text-align:center}\n.lf-brand{font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:6px}\n.lf-brand em{font-style:italic;background:var(--holo);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}\n.lf-details{font-size:11px;color:var(--ink-faint);margin-bottom:4px}\n.lf-links{font-size:11px;color:var(--ink-faint)}\n.lf-links a{color:var(--purple-2);text-decoration:none}\n.lf-links a:hover{color:var(--pink)}\n.lf-credit{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);margin-top:10px;opacity:0.7}\n\n/* ======== Scrollbars ======== */\n.side-list::-webkit-scrollbar,.main::-webkit-scrollbar{width:4px}\n.side-list::-webkit-scrollbar-thumb,.main::-webkit-scrollbar-thumb{background:rgba(178,107,255,0.3);border-radius:2px}\n.side-list::-webkit-scrollbar-track,.main::-webkit-scrollbar-track{background:transparent}\n\n/* ======== Mobile ======== */\n@media(max-width:900px){\n  .tier-cards{grid-template-columns:1fr;gap:14px}\n  .triad-grid{grid-template-columns:1fr;gap:12px}\n  .cf-grid{grid-template-columns:1fr;gap:10px}\n  .vip-ready-grid{grid-template-columns:1fr;gap:10px}\n  .iw-step{grid-template-columns:1fr;gap:18px}\n  .mock-sb-arrow,.mock-pop-arrow{position:static;transform:none;margin-top:8px;text-align:center;display:block}\n}\n@media(max-width:768px){\n  .topbar-nav{display:none}\n  .mobile-toggle{display:block}\n  .layout{position:relative}\n  .sidebar{position:absolute;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,0.5)}\n  .sidebar.open{transform:translateX(0)}\n  .sidebar-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.6);z-index:99}\n  .sidebar-overlay.show{display:block}\n  .main-inner{padding:28px 22px 80px}\n  .lesson-top{flex-direction:column;gap:10px}\n  .lesson-bottom{flex-direction:column;gap:12px;align-items:stretch}\n  .bottom-done-btn{justify-content:center}\n  .bottom-next{justify-content:center}\n  .tabs{margin-left:-6px;margin-right:-6px;padding-left:4px;padding-right:4px}\n  .tab{padding:9px 14px;font-size:12px}\n  .accordion-headline{font-size:14.5px}\n  .hero-text{font-size:17px}\n  .pullquote{padding:24px 22px 24px 60px}\n}\n\n\n/* ======================================================================\n   NEW COMPONENTS FOR V9\n   ====================================================================== */\n\n/* ===== MISSION CARD (Day 1) ===== */\n.mission-wrap{margin-top:32px}\n.mission-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--pink);margin-bottom:12px;display:flex;align-items:center;gap:6px;\n}\n.mission-card{\n  position:relative;\n  background:linear-gradient(135deg, #1a0e2e 0%, #0f0620 60%, #1a0e2e 100%);\n  border:1px solid var(--border-strong);\n  border-radius:24px;\n  padding:38px 40px 42px;\n  overflow:hidden;\n  display:grid;grid-template-columns:120px 1fr;gap:28px;align-items:center;\n}\n.mission-card::before{\n  content:'';position:absolute;inset:0;\n  background:\n    radial-gradient(ellipse at 30% 120%, rgba(255,138,209,0.28) 0%, transparent 55%),\n    radial-gradient(ellipse at 70% -10%, rgba(142,255,213,0.12) 0%, transparent 50%);\n  pointer-events:none;\n}\n.mission-flame-bg{position:relative;z-index:1;display:flex;align-items:center;justify-content:center}\n.mission-flame-bg svg{width:100%;max-width:120px;height:auto;filter:drop-shadow(0 0 24px rgba(255,138,209,0.4))}\n.mission-body{position:relative;z-index:1}\n.mission-line-1{\n  font-family:'Fraunces',serif;font-weight:600;font-style:italic;\n  font-size:22px;line-height:1.3;color:var(--ink);margin-bottom:10px;\n  letter-spacing:-0.3px;\n}\n.mission-hl{\n  background:var(--holo);\n  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;\n  font-weight:700;font-style:normal;\n}\n.mission-hl-alt{\n  color:var(--mint);font-weight:700;font-style:normal;\n}\n.mission-line-2{\n  font-size:14.5px;line-height:1.7;color:var(--ink-soft);margin-bottom:22px;\n}\n.mission-divider{\n  height:1px;background:linear-gradient(90deg, transparent, var(--border-strong), transparent);\n  margin:4px 0 18px;\n}\n.mission-line-3{\n  font-size:13.5px;line-height:1.7;color:var(--ink-soft);margin-bottom:14px;\n  font-family:'Nunito',sans-serif;\n}\n.mission-punch{\n  font-family:'Poppins',sans-serif;font-weight:900;font-style:italic;\n  font-size:24px;letter-spacing:-0.3px;\n  background:var(--holo);\n  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;\n  line-height:1.2;\n}\n\n/* ===== ABOUT AMANDA CARD (Day 1) ===== */\n.aa-wrap{margin-top:30px}\n.aa-card{\n  position:relative;\n  background:linear-gradient(135deg, var(--cream-2) 0%, var(--cream) 100%);\n  border-radius:20px;\n  padding:26px 30px 26px 26px;\n  display:grid;grid-template-columns:88px 1fr;gap:22px;align-items:center;\n  box-shadow:0 12px 40px rgba(178,107,255,0.18), 0 2px 6px rgba(0,0,0,0.2);\n  overflow:hidden;\n}\n.aa-card::before{\n  content:'';position:absolute;top:0;left:0;right:0;height:3px;\n  background:var(--holo);\n}\n.aa-avatar{\n  position:relative;\n  width:88px;height:88px;\n  border-radius:50%;\n  padding:3px;\n  background:var(--holo);\n  flex-shrink:0;\n}\n.aa-avatar-inner{\n  width:100%;height:100%;border-radius:50%;\n  background:linear-gradient(135deg, #1a0e2e 0%, #10172e 100%);\n  display:flex;align-items:center;justify-content:center;\n  position:relative;overflow:hidden;\n}\n.aa-avatar-inner::before{\n  content:'';position:absolute;inset:0;\n  background:\n    radial-gradient(circle at 30% 30%, rgba(255,138,209,0.3) 0%, transparent 50%),\n    radial-gradient(circle at 70% 70%, rgba(142,255,213,0.2) 0%, transparent 50%);\n}\n.aa-initials{\n  position:relative;z-index:1;\n  font-family:'Fraunces',serif;font-weight:700;font-style:italic;\n  font-size:30px;\n  background:var(--holo);\n  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;\n  letter-spacing:-1px;\n}\n.aa-sparkle{\n  position:absolute;top:-2px;right:-4px;\n  font-size:18px;color:var(--pink);\n  filter:drop-shadow(0 0 6px rgba(255,107,193,0.6));\n  animation:aaSparkle 2.5s ease-in-out infinite;\n}\n@keyframes aaSparkle{\n  0%,100%{transform:scale(1) rotate(0deg);opacity:0.9}\n  50%{transform:scale(1.15) rotate(15deg);opacity:1}\n}\n.aa-body{min-width:0}\n.aa-eyebrow{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;\n  text-transform:uppercase;font-weight:500;\n  color:#b26bff;margin-bottom:10px;\n}\n.aa-bio{\n  font-size:14.5px;line-height:1.7;color:var(--ink-dark);\n  font-family:'Nunito',sans-serif;font-weight:500;\n}\n.aa-bio strong{\n  font-weight:800;color:#b26bff;\n}\n.aa-sig{\n  margin-top:10px;\n  font-family:'Fraunces',serif;font-weight:400;font-style:italic;\n  font-size:13px;color:var(--ink-dark);opacity:0.7;letter-spacing:0.2px;\n}\n\n/* ===== OLD BARGAIN CARD (Day 1) ===== */\n.bargain-wrap{margin-top:30px}\n.bargain-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--cyan);margin-bottom:12px;\n}\n.bargain-card{\n  position:relative;\n  background:\n    linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%),\n    linear-gradient(135deg, #12192e, #0e1428);\n  border:1px solid var(--border);\n  border-radius:20px;\n  padding:36px 40px;\n  overflow:hidden;\n}\n.bargain-card::before{\n  content:'';position:absolute;inset:0;\n  background-image:\n    repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,107,193,0.025) 20px, rgba(255,107,193,0.025) 21px);\n  pointer-events:none;\n}\n.bargain-header{position:relative;z-index:1;display:flex;align-items:center;gap:16px;margin-bottom:16px}\n.bargain-stamp{\n  font-family:'DM Mono',monospace;font-weight:500;font-size:11px;letter-spacing:3px;\n  color:#ff6bc1;border:2px solid #ff6bc1;border-radius:4px;\n  padding:4px 10px;transform:rotate(-8deg);opacity:0.75;\n}\n.bargain-title{\n  font-family:'Fraunces',serif;font-weight:700;font-size:30px;\n  color:var(--ink);letter-spacing:-0.5px;\n  text-decoration:line-through;\n  text-decoration-color:rgba(255,107,193,0.55);\n  text-decoration-thickness:2px;\n}\n.bargain-body{\n  position:relative;z-index:1;\n  font-size:15.5px;line-height:1.75;color:var(--ink-soft);margin-bottom:22px;\n}\n.bargain-forms{position:relative;z-index:1;margin-bottom:22px}\n.bargain-form-label{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;\n  text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;font-weight:500;\n}\n.bargain-form-tags{display:flex;flex-wrap:wrap;gap:7px}\n.b-tag{\n  font-size:12px;font-weight:600;\n  padding:6px 12px;border-radius:100px;\n  background:rgba(255,107,193,0.08);\n  border:1px solid rgba(255,107,193,0.25);\n  color:var(--pink-2);\n  letter-spacing:0.2px;\n}\n.bargain-break{\n  position:relative;z-index:1;\n  padding-top:18px;border-top:1px solid var(--border);\n  display:flex;justify-content:center;\n}\n.bargain-break-line{\n  font-family:'Poppins',sans-serif;font-weight:800;font-style:italic;\n  font-size:20px;\n  background:var(--holo);\n  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;\n  letter-spacing:-0.3px;\n}\n\n/* ===== VALUES TRIAD (Day 1) ===== */\n.values-wrap{margin-top:32px}\n.values-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--mint);margin-bottom:8px;\n}\n.values-title{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:20px;\n  color:var(--ink);margin-bottom:18px;letter-spacing:-0.3px;\n}\n.values-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n.value-card{\n  position:relative;\n  background:var(--card-2);\n  border:1px solid var(--border);\n  border-radius:18px;\n  padding:24px 22px;\n  overflow:hidden;\n  transition:all .2s;\n}\n.value-card::before{\n  content:'';position:absolute;top:0;left:0;right:0;height:2px;\n  background:var(--holo);\n}\n.value-card.value-pink::before{background:linear-gradient(90deg,#ff6bc1,#ff8ad1)}\n.value-card.value-mint::before{background:linear-gradient(90deg,#8effd5,#6bd5ff)}\n.value-card.value-cyan::before{background:linear-gradient(90deg,#6bd5ff,#b26bff)}\n.value-card:hover{transform:translateY(-2px);border-color:var(--border-strong)}\n.value-icon{font-size:28px;margin-bottom:14px}\n.value-headline{display:flex;flex-direction:column;gap:2px;margin-bottom:14px}\n.value-over{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;\n  color:var(--ink);letter-spacing:-0.3px;line-height:1.1;\n}\n.value-over-sep{\n  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2.5px;\n  text-transform:uppercase;color:var(--ink-faint);font-weight:500;\n  margin:2px 0;\n}\n.value-under{\n  font-family:'Fraunces',serif;font-weight:400;font-style:italic;\n  font-size:16px;color:var(--ink-soft);opacity:0.7;\n  text-decoration:line-through;text-decoration-thickness:1px;\n  text-decoration-color:rgba(245,240,255,0.35);\n}\n.value-body{\n  font-size:13px;line-height:1.7;color:var(--ink-soft);\n}\n\n/* ===== CATEGORY MAP (Day 1) ===== */\n.catmap-wrap{margin-top:30px}\n.catmap-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--purple-2);margin-bottom:8px;\n}\n.catmap-title{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:20px;\n  color:var(--ink);margin-bottom:16px;letter-spacing:-0.3px;\n}\n.catmap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}\n.catmap-card{\n  background:var(--card-2);\n  border:1px solid var(--border);\n  border-radius:14px;\n  padding:18px 14px;\n  text-align:center;\n  transition:all .2s;\n  position:relative;\n  overflow:hidden;\n}\n.catmap-card::before{\n  content:'';position:absolute;top:0;left:0;right:0;height:2px;\n}\n.catmap-purple::before{background:linear-gradient(90deg,#b26bff,#c78fff)}\n.catmap-pink::before{background:linear-gradient(90deg,#ff6bc1,#ff8ad1)}\n.catmap-lime::before{background:linear-gradient(90deg,#d4ff00,#8effd5)}\n.catmap-cyan::before{background:linear-gradient(90deg,#6bd5ff,#b26bff)}\n.catmap-mint::before{background:linear-gradient(90deg,#8effd5,#d4ff00)}\n.catmap-card:hover{transform:translateY(-2px);border-color:var(--border-strong)}\n.catmap-emoji{font-size:26px;margin-bottom:8px}\n.catmap-name{\n  font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;\n  color:var(--ink);margin-bottom:6px;letter-spacing:-0.2px;line-height:1.2;\n}\n.catmap-desc{\n  font-size:11.5px;line-height:1.5;color:var(--ink-soft);\n}\n\n/* ===== FIRE STREAK CARD (Day 1) ===== */\n.fire-wrap{margin-top:30px}\n.fire-card{\n  background:linear-gradient(135deg, rgba(255,107,193,0.08) 0%, rgba(178,107,255,0.08) 100%);\n  border:1px solid var(--border);\n  border-radius:20px;\n  padding:28px 32px;\n  display:grid;grid-template-columns:1fr auto;gap:32px;align-items:center;\n  overflow:hidden;position:relative;\n}\n.fire-left{position:relative;z-index:1}\n.fire-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--pink);margin-bottom:6px;\n}\n.fire-title{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:18px;\n  color:var(--ink);margin-bottom:10px;letter-spacing:-0.3px;\n}\n.fire-body{\n  font-size:13.5px;line-height:1.7;color:var(--ink-soft);\n}\n.fire-visual{\n  position:relative;width:220px;min-width:220px;\n  display:flex;flex-direction:column;align-items:center;\n}\n.fire-bars{\n  display:flex;align-items:flex-end;gap:3px;\n  width:220px;height:70px;padding:6px;\n  background:rgba(0,0,0,0.15);border-radius:10px;\n  border:1px solid var(--border);\n}\n.fire-bar{\n  flex:1;background:linear-gradient(180deg, #ff6bc1, #b26bff);\n  border-radius:2px;opacity:0;\n  animation:fireBarUp .5s ease forwards;\n  box-shadow:0 0 6px rgba(255,107,193,0.4);\n}\n@keyframes fireBarUp{\n  from{opacity:0;transform:scaleY(0.3);transform-origin:bottom}\n  to{opacity:1;transform:scaleY(1);transform-origin:bottom}\n}\n.fire-streak-label{\n  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;\n  text-transform:uppercase;color:var(--ink-faint);margin-top:6px;font-weight:500;\n}\n.fire-emoji-float{\n  position:absolute;top:-4px;right:-6px;\n  font-size:28px;\n  animation:fireFloat 2.4s ease-in-out infinite;\n  filter:drop-shadow(0 0 10px rgba(255,107,193,0.6));\n}\n@keyframes fireFloat{\n  0%,100%{transform:translateY(0) rotate(-3deg)}\n  50%{transform:translateY(-6px) rotate(3deg)}\n}\n\n/* ===== ABOUT PAGE RECORDING GUIDE (Day 1) ===== */\n.recguide-wrap{margin-top:32px;border:1px dashed rgba(178,107,255,0.4);border-radius:16px;overflow:hidden}\n.recguide-banner{\n  display:flex;align-items:center;justify-content:space-between;gap:14px;\n  padding:18px 22px;cursor:pointer;\n  background:linear-gradient(135deg, rgba(199,143,255,0.08), rgba(107,213,255,0.06));\n  transition:background .2s;\n}\n.recguide-banner:hover{background:linear-gradient(135deg, rgba(199,143,255,0.14), rgba(107,213,255,0.1))}\n.recguide-banner-left{display:flex;align-items:center;gap:14px;flex:1}\n.recguide-icon{\n  width:42px;height:42px;border-radius:12px;\n  background:var(--holo);display:flex;align-items:center;justify-content:center;font-size:20px;\n  box-shadow:0 4px 14px rgba(178,107,255,0.4);\n}\n.recguide-eyebrow{\n  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;\n  text-transform:uppercase;color:var(--purple-2);font-weight:500;margin-bottom:3px;\n}\n.recguide-title{\n  font-family:'Poppins',sans-serif;font-weight:700;font-size:14.5px;\n  color:var(--ink);letter-spacing:-0.2px;\n}\n.recguide-chev{\n  font-family:'Poppins',sans-serif;font-weight:400;font-size:24px;color:var(--ink-soft);\n  width:32px;height:32px;display:flex;align-items:center;justify-content:center;\n  border-radius:50%;background:rgba(255,255,255,0.04);\n}\n.recguide-body{\n  padding:22px 28px 28px;\n  background:rgba(15,9,34,0.5);\n  border-top:1px solid var(--border);\n}\n.recguide-intro{\n  font-size:14px;line-height:1.7;color:var(--ink-soft);margin-bottom:22px;\n  padding:14px 18px;background:rgba(255,255,255,0.02);border-radius:10px;\n  border-left:3px solid var(--purple);\n}\n.recguide-timeline{display:flex;flex-direction:column;gap:10px}\n.recguide-row{\n  display:grid;grid-template-columns:44px 1fr;gap:14px;\n  padding:14px 16px;background:rgba(255,255,255,0.02);border-radius:10px;\n  border:1px solid var(--border);\n}\n.recguide-n{\n  font-family:'DM Mono',monospace;font-weight:600;font-size:14px;\n  color:var(--purple-2);text-align:center;padding-top:2px;letter-spacing:0.5px;\n}\n.recguide-beat-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:5px}\n.recguide-beat{\n  font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;\n  color:var(--ink);letter-spacing:-0.2px;\n}\n.recguide-time{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;\n  color:var(--cyan);font-weight:500;text-transform:uppercase;flex-shrink:0;\n}\n.recguide-note{\n  font-size:13px;line-height:1.65;color:var(--ink-soft);\n}\n.recguide-outro{\n  margin-top:18px;padding:14px 18px;\n  background:linear-gradient(135deg, rgba(255,107,193,0.06), rgba(142,255,213,0.04));\n  border-radius:10px;font-size:13px;line-height:1.65;color:var(--ink-soft);\n  border:1px solid var(--border);\n}\n\n/* ===== PATH CONVERGENCE (Day 2) ===== */\n.pc-wrap{margin-top:30px}\n.pc-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--pink);margin-bottom:12px;\n}\n.pc-visual{\n  background:linear-gradient(135deg, #0e1428 0%, #161e3a 100%);\n  border:1px solid var(--border);\n  border-radius:18px;\n  padding:26px 30px;\n  overflow:hidden;\n}\n.pc-visual svg{width:100%;height:auto;display:block}\n.pc-caption{\n  margin-top:14px;font-size:13.5px;line-height:1.7;color:var(--ink-soft);\n  font-style:italic;text-align:center;padding:0 18px;\n}\n\n/* ===== PRIMARY + SUPPORTING (Day 2) ===== */\n.ps-wrap{margin-top:30px}\n.ps-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--cyan);margin-bottom:14px;\n}\n.ps-cards{\n  display:grid;grid-template-columns:1fr 50px 1fr;gap:14px;align-items:stretch;\n}\n.ps-card{\n  background:var(--card-2);\n  border:1px solid var(--border);\n  border-radius:18px;\n  padding:22px 24px;\n  position:relative;overflow:hidden;\n  transition:all .2s;\n}\n.ps-card.ps-primary{border-color:rgba(255,107,193,0.4)}\n.ps-card.ps-primary::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ff6bc1,#b26bff)}\n.ps-card.ps-support{border-color:rgba(107,213,255,0.4)}\n.ps-card.ps-support::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#6bd5ff,#8effd5)}\n.ps-card-label{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;\n  text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin-bottom:8px;\n}\n.ps-card-title{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;\n  color:var(--ink);margin-bottom:10px;letter-spacing:-0.3px;\n}\n.ps-card-body{\n  font-size:13.5px;line-height:1.65;color:var(--ink-soft);\n}\n.ps-connector{display:flex;align-items:center;justify-content:center}\n.ps-plus{\n  font-family:'Poppins',sans-serif;font-weight:300;font-size:36px;\n  color:var(--purple-2);opacity:0.7;\n}\n.ps-footer{\n  margin-top:16px;text-align:center;\n  font-family:'Fraunces',serif;font-style:italic;font-size:15px;\n  color:var(--ink-soft);\n}\n\n/* ===== INFINITE VS FINITE (Day 3) ===== */\n.ivf-wrap{margin-top:30px}\n.ivf-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--mint);margin-bottom:14px;\n}\n.ivf-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}\n.ivf-card{\n  background:var(--card-2);\n  border:1px solid var(--border);\n  border-radius:18px;\n  padding:26px 26px 24px;\n  text-align:center;position:relative;overflow:hidden;\n}\n.ivf-card.ivf-infinite{border-top:3px solid #b26bff}\n.ivf-card.ivf-finite{border-top:3px solid #ff6bc1}\n.ivf-svg{margin-bottom:14px}\n.ivf-svg svg{width:120px;height:80px}\n.ivf-label{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;\n  text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin-bottom:4px;\n}\n.ivf-offer{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:18px;\n  color:var(--ink);margin-bottom:10px;letter-spacing:-0.3px;\n}\n.ivf-body{\n  font-size:13px;line-height:1.7;color:var(--ink-soft);\n}\n.ivf-footer{\n  margin-top:16px;text-align:center;\n  font-family:'Fraunces',serif;font-style:italic;font-size:15px;\n  color:var(--ink-soft);\n}\n\n/* ===== SAME TOOL TWO POSITIONS (Day 4) ===== */\n.sttp-wrap{margin-top:30px}\n.sttp-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--cyan);margin-bottom:14px;\n}\n.sttp-diagram{\n  background:linear-gradient(135deg, #0e1428, #161e3a);\n  border:1px solid var(--border);border-radius:18px;\n  padding:28px 24px;\n}\n.sttp-diagram svg{width:100%;height:auto;max-height:180px;display:block}\n.sttp-caption{\n  margin-top:14px;font-size:13.5px;line-height:1.7;color:var(--ink-soft);\n  font-style:italic;text-align:center;padding:0 18px;\n}\n\n/* ===== TREASURE GRID (Day 4) ===== */\n.tg-wrap{margin-top:30px}\n.tg-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--purple-2);margin-bottom:14px;\n}\n.tg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}\n.tg-tile{\n  aspect-ratio:1;\n  background:var(--card-2);\n  border:1px solid var(--border);\n  border-radius:12px;\n  padding:10px 6px;\n  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;\n  text-align:center;\n  transition:all .2s;\n  opacity:0;\n  animation:tgIn .4s ease forwards;\n}\n@keyframes tgIn{\n  from{opacity:0;transform:scale(0.85)}\n  to{opacity:1;transform:scale(1)}\n}\n.tg-tile:hover{transform:translateY(-2px);border-color:var(--border-strong)}\n.tg-tile.tg-more{\n  background:linear-gradient(135deg, rgba(255,107,193,0.12), rgba(178,107,255,0.12));\n  border-color:var(--border-strong);\n}\n.tg-e{font-size:20px}\n.tg-n{\n  font-family:'Nunito',sans-serif;font-weight:700;font-size:10.5px;\n  color:var(--ink);line-height:1.2;letter-spacing:-0.1px;\n}\n.tg-caption{\n  margin-top:14px;font-size:13.5px;line-height:1.7;color:var(--ink-soft);\n  font-style:italic;text-align:center;\n}\n\n/* ===== NODE ARROW (Day 5) ===== */\n.na-wrap{margin-top:30px}\n.na-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--mint);margin-bottom:14px;\n}\n.na-diagram{\n  background:linear-gradient(135deg, #0e1428, #161e3a);\n  border:1px solid var(--border);border-radius:18px;\n  padding:24px 20px;\n}\n.na-diagram svg{width:100%;height:auto;max-height:150px;display:block}\n.na-caption{\n  margin-top:14px;font-size:13.5px;line-height:1.7;color:var(--ink-soft);\n  font-style:italic;text-align:center;padding:0 18px;\n}\n\n/* ===== HALF-STARTED VS SHIPPED (Day 6) ===== */\n.hss-wrap{margin-top:30px}\n.hss-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--pink);margin-bottom:14px;\n}\n.hss-grid{\n  display:grid;grid-template-columns:1fr 60px 1fr;gap:14px;align-items:center;\n  background:linear-gradient(135deg, #0e1428, #161e3a);\n  border:1px solid var(--border);border-radius:18px;\n  padding:28px 24px;\n}\n.hss-side{display:flex;flex-direction:column;gap:14px;align-items:center}\n.hss-side-label{\n  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;\n  text-transform:uppercase;color:var(--ink-faint);font-weight:500;\n}\n.hss-tiles{\n  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;\n}\n.hss-tile-half{\n  background:rgba(245,240,255,0.04);\n  border:1px dashed rgba(245,240,255,0.15);\n  border-radius:6px;\n  height:38px;padding:6px;\n  display:flex;align-items:center;\n}\n.hss-tile-bar{\n  height:4px;background:rgba(245,240,255,0.25);border-radius:100px;\n}\n.hss-side-caption{\n  font-size:12px;line-height:1.6;color:var(--ink-faint);\n  text-align:center;font-style:italic;\n}\n.hss-arrow{display:flex;align-items:center;justify-content:center}\n.hss-arrow svg{width:44px;height:44px;filter:drop-shadow(0 0 8px rgba(255,107,193,0.4))}\n.hss-shipped{\n  background:linear-gradient(135deg, rgba(255,107,193,0.12), rgba(142,255,213,0.08));\n  border:1px solid var(--border-strong);\n  border-radius:12px;\n  padding:20px 18px;width:100%;\n  display:flex;flex-direction:column;gap:7px;align-items:center;\n  box-shadow:0 8px 24px rgba(178,107,255,0.15);\n  position:relative;\n}\n.hss-shipped-check{\n  position:absolute;top:-10px;right:-10px;\n  width:28px;height:28px;border-radius:50%;\n  background:var(--holo);color:#fff;\n  display:flex;align-items:center;justify-content:center;\n  font-size:14px;font-weight:700;\n  box-shadow:0 4px 12px rgba(178,107,255,0.5);\n}\n.hss-shipped-bar{\n  width:100%;height:6px;background:rgba(245,240,255,0.25);border-radius:100px;\n}\n.hss-shipped-bar.full{background:var(--holo);box-shadow:0 0 10px rgba(255,107,193,0.4)}\n.hss-ship .hss-side-caption{color:var(--mint);font-style:normal;font-weight:600}\n\n/* ===== REFERRAL MATH HERO (Day 7) ===== */\n.rm-wrap{margin-top:30px}\n.rm-badge{\n  font-family:'DM Mono',monospace;font-size:10px;\n  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;\n  color:var(--mint);margin-bottom:14px;\n}\n.rm-rows{display:flex;flex-direction:column;gap:10px}\n.rm-row{\n  display:grid;grid-template-columns:60px 1fr 30px 1.4fr;gap:14px;align-items:center;\n  padding:18px 22px;\n  background:var(--card-2);\n  border:1px solid var(--border);\n  border-radius:14px;\n  position:relative;overflow:hidden;\n}\n.rm-row::before{content:'';position:absolute;top:0;bottom:0;left:0;width:4px}\n.rm-mint::before{background:linear-gradient(180deg,#8effd5,#6bd5ff)}\n.rm-pink::before{background:linear-gradient(180deg,#ff6bc1,#ff8ad1)}\n.rm-purple::before{background:linear-gradient(180deg,#b26bff,#c78fff)}\n.rm-num{\n  font-family:'Poppins',sans-serif;font-weight:900;font-size:40px;\n  background:var(--holo);\n  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;\n  text-align:center;line-height:1;\n}\n.rm-label{\n  font-size:14px;color:var(--ink-soft);line-height:1.4;\n}\n.rm-label strong{color:var(--ink);font-weight:700}\n.rm-equal{\n  font-family:'DM Mono',monospace;font-size:22px;color:var(--ink-faint);text-align:center;\n}\n.rm-result{\n  font-family:'Poppins',sans-serif;font-weight:800;font-size:16px;\n  color:var(--ink);letter-spacing:-0.2px;line-height:1.3;\n}\n.rm-footer{\n  margin-top:16px;text-align:center;\n  font-family:'Fraunces',serif;font-style:italic;font-size:15px;\n  color:var(--ink-soft);\n}\n\n/* ===== MOBILE RES
